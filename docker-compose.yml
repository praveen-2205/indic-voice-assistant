version: '3.9'

services:
  indic-voice-assistant:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: indic-voice-assistant
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - whisper-cache:/root/.cache/whisper
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  huggingface-cache:
  whisper-cache: